        ApplicationLogging:
            type: object
            properties:
                enabled:
                    type: boolean
                logLevel:
                    type: string
                    description: enum:logLevel=FATAL,CRITICAL,ERROR,WARN,INFO,DEBUG,TRACE,UNKNOWN
                monitoringLogDataEnabled:
                    type: boolean
                retentionPeriod:
                    pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
                    type: string
