    /v1/users/roles:
        get:
            tags:
                - Orchestrator
            description: Lists all predefined roles in the system.
            operationId: Orchestrator_ListUserRoles
            parameters:
                - name: pageSize
                  in: query
                  schema:
                    type: integer
                    format: int32
                - name: pageToken
                  in: query
                  schema:
                    type: string
                - name: asc
                  in: query
                  schema:
                    type: boolean
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListUserRolesResponse'
                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
    /v1/users/user_permission:
        post:
            tags:
                - Orchestrator
            description: Upsert resource permissions for the currently authenticated user, creating a new user entry if necessary.
            operationId: Orchestrator_UpsertUserPermission
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UserPermission'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UpsertUserPermissionResponse'
                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
    /v1/users/{userId}:
        get:
            tags:
                - Orchestrator
            description: Retrieves a specific user by their ID. This endpoint is restricted to users with elevated roles, such as admin.
            operationId: Orchestrator_GetUser
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
        delete:
            tags:
                - Orchestrator
            description: Remove a user from the system. This is a soft delete that disables the user and removes their access, but retains their data for audit purposes.
            operationId: Orchestrator_RemoveUser
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content: {}
                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
