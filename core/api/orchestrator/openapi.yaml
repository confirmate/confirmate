components:
    schemas:
        AssessmentResult:
            required:
                - id
                - createdAt
                - metricId
                - metricConfiguration
                - evidenceId
                - resourceId
                - resourceTypes
                - complianceComment
                - targetOfEvaluationId
                - toolId
                - historyUpdatedAt
                - history
            type: object
            properties:
                id:
                    type: string
                    description: Assessment result id
                createdAt:
                    type: string
                    description: Time of assessment
                    format: date-time
                metricId:
                    type: string
                    description: Reference to the metric the assessment was based on
                metricConfiguration:
                    allOf:
                        - $ref: '#/components/schemas/MetricConfiguration'
                    description: Data corresponding to the metric by the given metric id
                compliant:
                    type: boolean
                    description: 'Compliant case: true or false'
                evidenceId:
                    type: string
                    description: Reference to the last assessed evidence
                resourceId:
                    type: string
                    description: Reference to the resource of the assessed evidence
                resourceTypes:
                    type: array
                    items:
                        type: string
                    description: Resource types
                complianceComment:
                    type: string
                    description: ComplianceComment contains a human readable description on the reason for (non)-compliance.
                complianceDetails:
                    type: array
                    items:
                        $ref: '#/components/schemas/ComparisonResult'
                    description: ComplianceDetails contains machine-readable details about which comparisons lead to a (non)-compliance.
                targetOfEvaluationId:
                    type: string
                    description: The target of evaluation which this assessment result belongs to
                toolId:
                    type: string
                    description: Reference to the tool which provided the assessment result
                historyUpdatedAt:
                    type: string
                    description: The time of the last update of the assessment result history field
                    format: date-time
                history:
                    type: array
                    items:
                        $ref: '#/components/schemas/Record'
                    description: Stores the history of evidence IDs and timestamps for evidence that have the same content as the evidence used for this assessment result.
            description: |-
                A result resource, representing the result after assessing the cloud resource
                 with id resource_id.
        AssessmentTool:
            required:
                - name
                - availableMetrics
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
                availableMetrics:
                    type: array
                    items:
                        type: string
                    description: a list of metrics that this tool can assess, referred by their ids
            description: |-
                Represents an external tool or service that offers assessments according to
                 certain metrics.
        AuditScope:
            required:
                - id
                - name
                - targetOfEvaluationId
                - catalogId
            type: object
            properties:
                id:
                    type: string
                    description: Audit Scope ID
                name:
                    type: string
                targetOfEvaluationId:
                    type: string
                catalogId:
                    type: string
                assuranceLevel:
                    type: string
                    description: |-
                        an assurance level is not offered by every catalog, therefore it is
                         optional
                readers:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                    description: |-
                        List of user IDs with explicit permission to view this target (Read-only).
                         If empty, only users in the contributor or admin lists (or elevated system roles) have access.
                contributors:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                    description: |-
                        List of user IDs responsible for the content and maintenance of this target.
                         These users can modify settings and data but cannot manage other users' access.
                admins:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                    description: |-
                        List of user IDs with administrative control over this target.
                         These users can manage permissions for others and perform destructive actions like deletion.
            description: |-
                A Audit Scope binds a target of evaluation to a catalog, so the target of evaluation is
                 evaluated regarding this catalog's controls
        Catalog:
            required:
                - id
                - name
                - categories
                - shortName
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
                categories:
                    type: array
                    items:
                        $ref: '#/components/schemas/Category'
                allInScope:
                    type: boolean
                    description: |-
                        Certain security catalogs do not allow to select the scope of the controls,
                         but all controls are automatically "in scope", however they can be set to a
                         DELEGATED status.
                assuranceLevels:
                    type: array
                    items:
                        type: string
                    description: |-
                        A list of the assurance levels, e.g., basic, substantial and high for the
                         EUCS catalog.
                shortName:
                    type: string
                    description: Catalogs short name, e.g. EUCS
                metadata:
                    allOf:
                        - $ref: '#/components/schemas/Catalog_Metadata'
                    description: metadata of the catalog
        Catalog_Metadata:
            type: object
            properties:
                color:
                    type: string
                    description: a color for the target of evaluation used by the UI
        Category:
            required:
                - name
                - catalogId
                - controls
            type: object
            properties:
                name:
                    type: string
                catalogId:
                    type: string
                    description: Reference to the catalog this category belongs to.
                description:
                    type: string
                controls:
                    type: array
                    items:
                        $ref: '#/components/schemas/Control'
        Certificate:
            required:
                - id
                - name
                - targetOfEvaluationId
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                targetOfEvaluationId:
                    type: string
                issueDate:
                    type: string
                expirationDate:
                    type: string
                standard:
                    type: string
                assuranceLevel:
                    type: string
                cab:
                    type: string
                description:
                    type: string
                states:
                    type: array
                    items:
                        $ref: '#/components/schemas/State'
                    description: A list of states at specific times
            description: An ISO17021-based certificate
        ComparisonResult:
            required:
                - property
                - value
                - operator
                - targetValue
                - success
            type: object
            properties:
                property:
                    type: string
                    description: Property is the property that was compared
                value:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Value is the value in the property
                operator:
                    type: string
                    description: Operator is the operator used in the comparison
                targetValue:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: TargetValue is the target value used in the comparison
                success:
                    type: boolean
                    description: Success is true, if the comparison was successful
            description: An optional structure containing more details how a comparison inside an assessment result was done and if it was successful.
        Control:
            required:
                - id
                - categoryName
                - categoryCatalogId
                - name
                - controls
                - metrics
            type: object
            properties:
                id:
                    type: string
                    description: |-
                        A short name of the control, e.g. OPS-01, as used in OSCAL; it is not a
                         unique ID!
                categoryName:
                    type: string
                categoryCatalogId:
                    type: string
                name:
                    type: string
                    description: Human-readable name of the control
                description:
                    type: string
                    description: Description of the control
                controls:
                    type: array
                    items:
                        $ref: '#/components/schemas/Control'
                    description: |-
                        List of sub - controls -
                             this is in accordance with the OSCAL model.
                metrics:
                    type: array
                    items:
                        $ref: '#/components/schemas/Metric'
                    description: |-
                        metrics contains either a list of reference to metrics - in this case only
                         the id field of the metric is populated - or a list of populated metric
                         meta-data, most likely returned by the database.
                parentControlId:
                    type: string
                    description: Reference to the parent category this control belongs to.
                parentControlCategoryName:
                    type: string
                parentControlCategoryCatalogId:
                    type: string
                assuranceLevel:
                    type: string
                    description: |-
                        An assurance level is not offered by every catalog, therefore it is
                         optional.
            description: |-
                Control represents a certain Control that needs to be fulfilled. It could be
                 a Control in a certification catalog. It follows the OSCAL model. A
                 requirement in the EUCS terminology, e.g., is represented as the lowest
                 sub-control.
        Dependency:
            type: object
            properties:
                path:
                    type: string
                version:
                    type: string
        EvaluationResult:
            required:
                - id
                - status
                - timestamp
                - assessmentResultIds
            type: object
            properties:
                id:
                    type: string
                    description: Evaluation result id
                targetOfEvaluationId:
                    type: string
                    description: The Target of Evaluation ID the evaluation belongs to
                auditScopeId:
                    type: string
                    description: The Audit Scope ID the evaluation belongs to
                controlId:
                    type: string
                    description: The control id the evaluation was based on
                controlCategoryName:
                    type: string
                    description: The category the evaluated control belongs to
                controlCatalogId:
                    type: string
                    description: The catalog the evaluated control belongs to
                parentControlId:
                    type: string
                    description: Optionally, specifies the parent control ID, if this is a sub-control
                status:
                    enum:
                        - EVALUATION_STATUS_UNSPECIFIED
                        - EVALUATION_STATUS_COMPLIANT
                        - EVALUATION_STATUS_COMPLIANT_MANUALLY
                        - EVALUATION_STATUS_NOT_COMPLIANT
                        - EVALUATION_STATUS_NOT_COMPLIANT_MANUALLY
                        - EVALUATION_STATUS_PENDING
                    type: string
                    description: Evaluation status
                    format: enum
                timestamp:
                    type: string
                    description: Time of evaluation
                    format: date-time
                assessmentResultIds:
                    type: array
                    items:
                        type: string
                    description: List of assessment results because of which the evaluation status is compliant or not compliant
                comment:
                    type: string
                validUntil:
                    type: string
                    description: |-
                        Optional, but required if the status is one of the "manually" ones. This
                         denotes how long the (manual) created evaluation result is valid. During
                         this time, no automatic results are generated for the specific control.
                    format: date-time
                data:
                    type: string
                    description: |-
                        Optional, but if you use manually created evaluation results, you can provide a justification for the manual
                         creation, such as a large file like a policy in PDF format.
                    format: bytes
            description: |-
                A evaluation result resource, representing the result after evaluating the
                 target of evaluation with a specific control target_of_evaluation_id, category_name and
                 catalog_id are necessary to get the corresponding AuditScope
        GetTargetOfEvaluationStatisticsResponse:
            type: object
            properties:
                numberOfDiscoveredResources:
                    type: string
                    description: number of discovered resources per target of evaluation
                numberOfAssessmentResults:
                    type: string
                    description: number of assessment results per target of evaluation
                numberOfEvidences:
                    type: string
                    description: number of evidences per target of evaluation
                numberOfSelectedCatalogs:
                    type: string
                    description: number of selected catalogs per target of evaluation
        GoogleProtobufAny:
            type: object
            properties:
                '@type':
                    type: string
                    description: The type of the serialized message.
            additionalProperties: true
            description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
        GoogleProtobufValue:
            description: Represents a dynamically typed value which can be either null, a number, a string, a boolean, a recursive struct value, or a list of values.
        ListAssessmentResultsResponse:
            type: object
            properties:
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/AssessmentResult'
                nextPageToken:
                    type: string
        ListAssessmentToolsResponse:
            type: object
            properties:
                tools:
                    type: array
                    items:
                        $ref: '#/components/schemas/AssessmentTool'
                nextPageToken:
                    type: string
        ListAuditScopesResponse:
            type: object
            properties:
                auditScopes:
                    type: array
                    items:
                        $ref: '#/components/schemas/AuditScope'
                nextPageToken:
                    type: string
        ListCatalogsResponse:
            type: object
            properties:
                catalogs:
                    type: array
                    items:
                        $ref: '#/components/schemas/Catalog'
                nextPageToken:
                    type: string
        ListCertificatesResponse:
            type: object
            properties:
                certificates:
                    type: array
                    items:
                        $ref: '#/components/schemas/Certificate'
                nextPageToken:
                    type: string
        ListControlsResponse:
            type: object
            properties:
                controls:
                    type: array
                    items:
                        $ref: '#/components/schemas/Control'
                nextPageToken:
                    type: string
        ListEvaluationResultsResponse:
            type: object
            properties:
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/EvaluationResult'
                nextPageToken:
                    type: string
        ListMetricConfigurationResponse:
            type: object
            properties:
                configurations:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/MetricConfiguration'
                    description: A map of metric configurations associated by their metric ID
                nextPageToken:
                    type: string
        ListMetricsResponse:
            required:
                - metrics
            type: object
            properties:
                metrics:
                    type: array
                    items:
                        $ref: '#/components/schemas/Metric'
                nextPageToken:
                    type: string
        ListPublicCertificatesResponse:
            type: object
            properties:
                certificates:
                    type: array
                    items:
                        $ref: '#/components/schemas/Certificate'
                nextPageToken:
                    type: string
        ListTargetsOfEvaluationResponse:
            required:
                - targetsOfEvaluation
                - targetsOfEvaluation
            type: object
            properties:
                targetsOfEvaluation:
                    type: array
                    items:
                        $ref: '#/components/schemas/TargetOfEvaluation'
                nextPageToken:
                    type: string
        ListUserPermissionsResponse:
            type: object
            properties:
                userPermissions:
                    type: array
                    items:
                        $ref: '#/components/schemas/UserPermission'
                nextPageToken:
                    type: string
        ListUserRolesResponse:
            type: object
            properties:
                roles:
                    type: array
                    items:
                        enum:
                            - ROLE_UNSPECIFIED
                            - ROLE_ADMIN
                            - ROLE_COMPLIANCE_MANAGER
                            - ROLE_EXPERT_COMPLIANCE_MANAGER
                            - ROLE_INTERNAL_CONTROL_OWNER
                            - ROLE_TECHNICAL_IMPLEMENTER
                            - ROLE_AUDITOR
                            - ROLE_CHIEF_INFORMATION_SECURITY_OFFICER
                        type: string
                        format: enum
        ListUsersResponse:
            type: object
            properties:
                users:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                nextPageToken:
                    type: string
        Metric:
            required:
                - id
                - name
                - description
                - version
                - category
            type: object
            properties:
                id:
                    type: string
                    description: Required. The unique identifier of the metric.
                name:
                    type: string
                    description: Required. The name of the metric.
                description:
                    type: string
                    description: The description of the metric
                version:
                    type: string
                    description: The version of this metric
                comments:
                    type: string
                    description: Comments that describe the purpose of this metric. They may also describe a scenario in which the metric can be useful.
                category:
                    type: string
                    description: Semantically, the reference to control catalog category or domain; it must conform to the directory structure of the security-metrics respository
                implementation:
                    allOf:
                        - $ref: '#/components/schemas/MetricImplementation'
                    description: |-
                        The implementation of this metric. This ensures that we are modelling an
                         association between a Metric and its MetricImplementation.
                deprecatedSince:
                    type: string
                    description: |-
                        Optional, but required if the metric is removed. The metric is not deleted
                         for backward compatibility and the timestamp is set to the time of removal.
                    format: date-time
            description: A metric resource
        MetricConfiguration:
            required:
                - operator
                - targetValue
                - isDefault
                - metricId
                - targetOfEvaluationId
            type: object
            properties:
                operator:
                    type: string
                    description: The operator to compare the metric, such as == or >
                targetValue:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: The target value
                isDefault:
                    type: boolean
                    description: Whether this configuration is a default configuration
                updatedAt:
                    type: string
                    description: The last time of update
                    format: date-time
                metricId:
                    type: string
                    description: The metric this configuration belongs to
                targetOfEvaluationId:
                    type: string
                    description: The target of evaluation this configuration belongs to
            description: Defines the operator and a target value for an individual metric
        MetricImplementation:
            required:
                - metricId
                - code
            type: object
            properties:
                metricId:
                    type: string
                    description: The metric which is implemented
                lang:
                    enum:
                        - LANGUAGE_UNSPECIFIED
                        - LANGUAGE_REGO
                    type: string
                    description: The language this metric is implemented in
                    format: enum
                code:
                    type: string
                    description: The actual implementation
                updatedAt:
                    type: string
                    description: The last time of update
                    format: date-time
            description: MetricImplementation defines the implementation of an individual metric.
        Record:
            required:
                - evidenceId
                - evidenceRecordedAt
            type: object
            properties:
                evidenceId:
                    type: string
                evidenceRecordedAt:
                    type: string
                    format: date-time
        Runtime:
            type: object
            properties:
                releaseVersion:
                    type: string
                    description: release_version is the latest Confirmate release version for this commit
                vcs:
                    type: string
                    description: vcs is the used version control system
                commitHash:
                    type: string
                    description: commit_hash is the current Confirmate commit hash
                commitTime:
                    type: string
                    description: commit_time is the time of the Confirmate commit
                    format: date-time
                golangVersion:
                    type: string
                    description: golang_version is the used golang version
                dependencies:
                    type: array
                    items:
                        $ref: '#/components/schemas/Dependency'
                    description: dependency is a list of used runtime dependencies
        State:
            type: object
            properties:
                id:
                    type: string
                state:
                    type: string
                    description: An EUCS-defined state, e.g. `new`, `suspended` or `withdrawn`
                treeId:
                    type: string
                timestamp:
                    type: string
                certificateId:
                    type: string
                    description: Reference to the certificate
            description: A state of a certificate at a given time
        Status:
            type: object
            properties:
                code:
                    type: integer
                    description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
                    format: int32
                message:
                    type: string
                    description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
                details:
                    type: array
                    items:
                        $ref: '#/components/schemas/GoogleProtobufAny'
                    description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
            description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
        StoreAssessmentResultResponse:
            type: object
            properties: {}
            description: |-
                StoreAssessmentResultReponse belongs to StoreAssessmentResult, which uses a
                 custom unary RPC and therefore requires a response message according to the
                 style convention. Since no return values are required, this is empty.
        TargetOfEvaluation:
            required:
                - id
                - name
                - configuredMetrics
                - targetType
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
                configuredMetrics:
                    type: array
                    items:
                        $ref: '#/components/schemas/Metric'
                createdAt:
                    type: string
                    description: creation time of the target_of_evaluation
                    format: date-time
                updatedAt:
                    type: string
                    description: last update time of the target_of_evaluation
                    format: date-time
                metadata:
                    allOf:
                        - $ref: '#/components/schemas/TargetOfEvaluation_Metadata'
                    description: additional metadata of the target of evaluation, mostly used for the UI
                targetType:
                    enum:
                        - TARGET_TYPE_UNSPECIFIED
                        - TARGET_TYPE_CLOUD
                        - TARGET_TYPE_PRODUCT
                        - TARGET_TYPE_ORGANIZATION
                    type: string
                    description: 'type of the target to be evaluated: cloud, product or organization'
                    format: enum
                readers:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                    description: |-
                        List of user IDs with explicit permission to view this target (Read-only).
                         If empty, only users in the contributor or admin lists (or elevated system roles) have access.
                contributors:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                    description: |-
                        List of user IDs responsible for the content and maintenance of this target.
                         These users can modify settings and data but cannot manage other users' access.
                admins:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                    description: |-
                        List of user IDs with administrative control over this target.
                         These users can manage permissions for others and perform destructive actions like deletion.
        TargetOfEvaluation_Metadata:
            type: object
            properties:
                labels:
                    type: object
                    additionalProperties:
                        type: string
                    description: a map of key/value pairs, e.g., env:prod
                icon:
                    type: string
                    description: an icon for the target of evaluation used by the UI
        UpsertUserPermissionResponse:
            type: object
            properties:
                userPermission:
                    $ref: '#/components/schemas/UserPermission'
        User:
            required:
                - id
            type: object
            properties:
                id:
                    type: string
                    description: ID is the unique identifier of the user
                username:
                    type: string
                    description: Username is the name used to be displayed
                email:
                    type: string
                    description: Email is the email address of the user, if available.
                firstName:
                    type: string
                    description: FirstName is the first name of the user, if available.
                lastName:
                    type: string
                    description: LastName is the last name of the user, if available.
                roles:
                    type: array
                    items:
                        enum:
                            - ROLE_UNSPECIFIED
                            - ROLE_ADMIN
                            - ROLE_COMPLIANCE_MANAGER
                            - ROLE_EXPERT_COMPLIANCE_MANAGER
                            - ROLE_INTERNAL_CONTROL_OWNER
                            - ROLE_TECHNICAL_IMPLEMENTER
                            - ROLE_AUDITOR
                            - ROLE_CHIEF_INFORMATION_SECURITY_OFFICER
                        type: string
                        format: enum
                    description: Roles represent the roles assigned to the user in the system, which determine their permissions and access levels.
                enabled:
                    type: boolean
                    description: Enabled indicates whether the user is active/enabled in the system
                attributes:
                    type: object
                    additionalProperties:
                        type: string
                    description: Attributes contains additional key-value pairs associated with the user, such as department or team.
                lastAccess:
                    type: string
                    description: LastAccess indicates the last time the user accessed the system.
                    format: date-time
            description: Represents a user from the IdP
        UserPermission:
            required:
                - userId
                - resourceId
                - resourceType
                - permission
            type: object
            properties:
                userId:
                    type: string
                    description: User ID is required to identify the user for whom the perission is being upserted.
                resourceId:
                    type: string
                    description: Resource ID is required to identify the parent resource for which the permission is being upserted. This can be the ID of a Target of Evaluation or Audit Scope.
                resourceType:
                    enum:
                        - OBJECT_TYPE_UNSPECIFIED
                        - OBJECT_TYPE_METRIC
                        - OBJECT_TYPE_METRIC_CONFIGURATION
                        - OBJECT_TYPE_METRIC_IMPLEMENTATION
                        - OBJECT_TYPE_TARGET_OF_EVALUATION
                        - OBJECT_TYPE_AUDIT_SCOPE
                        - OBJECT_TYPE_ASSESSMENT_RESULT
                        - OBJECT_TYPE_ASSESSMENT_TOOL
                        - OBJECT_TYPE_USER
                        - OBJECT_TYPE_USER_PERMISSION
                        - OBJECT_TYPE_CERTIFICATE
                        - OBJECT_TYPE_CATALOG
                        - OBJECT_TYPE_CATEGORY
                        - OBJECT_TYPE_CONTROL
                        - OBJECT_TYPE_EVALUATION_RESULT
                        - OBJECT_TYPE_EVIDENCE
                    type: string
                    description: Resource type is required to specify the parent type of the resource for which the permission is being upserted. This can be the type of a Target of Evaluation or Audit Scope.
                    format: enum
                permission:
                    enum:
                        - PERMISSION_UNSPECIFIED
                        - PERMISSION_READER
                        - PERMISSION_CONTRIBUTOR
                        - PERMISSION_ADMIN
                    type: string
                    description: Role permission is required to specify the level of access the user should have for the resource (e.g., reader, contributor, admin).
                    format: enum
tags:
    - name: Orchestrator
