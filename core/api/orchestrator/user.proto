syntax = "proto3";

package confirmate.orchestrator.v1;

import "api/common/runtime.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "tagger/tagger.proto";

option go_package = "confirmate.io/core/api/orchestrator";

// Represents a user from the IdP
message User {
  // ID is the unique identifier of the user
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];

  // Username is the name used to be displayed
  optional string username = 2;

  // Email is the email address of the user, if available.
  optional string email = 3;

  // FirstName is the first name of the user, if available.
  optional string first_name = 4;

  // LastName is the last name of the user, if available.
  optional string last_name = 5;

  // Roles represent the roles assigned to the user in the system, which determine their permissions and access levels.
  repeated Role roles = 6 [
    (buf.validate.field).repeated.items.enum.defined_only = true,
    (tagger.tags) = "gorm:\"serializer:json\""];

  // Enabled indicates whether the user is active/enabled in the system
  bool enabled = 7;

  // Attributes contains additional key-value pairs associated with the user, such as department or team.
  map<string, string> attributes = 8 [(tagger.tags) = "gorm:\"serializer:json\""];

  // Expiration date indicates when the user's access expires.
  google.protobuf.Timestamp expiration_date = 9 [(tagger.tags) = "gorm:\"serializer:timestamppb;type:timestamp\""];

  // LastAccess indicates the last time the user accessed the system.
  google.protobuf.Timestamp last_access = 10 [(tagger.tags) = "gorm:\"serializer:timestamppb;type:timestamp\""];
}

// Predefined roles in the system. These should align with the roles defined in the IdP
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_COMPLIANCE_MANAGER = 2;
  ROLE_EXPERT_COMPLIANCE_MANAGER = 3;
  ROLE_INTERNAL_CONTROL_OWNER = 4;
  ROLE_TECHNICAL_IMPLEMENTER = 5;
  ROLE_AUDITOR = 6;
  ROLE_CHIEF_INFORMATION_SECURITY_OFFICER = 7;
}