syntax = "proto3";

package confirmate.orchestrator.v1;

import "api/common/runtime.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "tagger/tagger.proto";

option go_package = "confirmate.io/core/api/orchestrator";

service UserManagement {
  // Returns information about the currently authenticated user
  rpc GetCurrentUser(GetCurrentUserRequest) returns (User) {
    option (google.api.http) = {get: "/v1/users/me"};
  }

  // Lists users with optional filtering
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/v1/users"};
  }

  // Retrieves a specific user by their ID. This endpoint is restricted to users with elevated roles, such as admin.
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = {get: "/v1/users/{user_id}"};
  }

  // Lists all predefined roles in the system.
  rpc ListUserRoles(ListUserRolesRequest) returns (ListUserRolesResponse) {
    option (google.api.http) = {get: "/v1/users/roles"};
  }
}

// Represents a user from the IdP
message User {
  // ID is the unique identifier of the user
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];

  // Username is the name used to be displayed
  string username = 2 [
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];

  // Email is the email address of the user, if available.
  optional string email = 3;

  // FirstName is the first name of the user, if available.
  optional string first_name = 4;

  // LastName is the last name of the user, if available.
  optional string last_name = 5;

  // Roles represent the roles assigned to the user in the system, which determine their permissions and access levels.
  repeated Role roles = 6 [
    (buf.validate.field).repeated.items.enum.defined_only = true,
    (tagger.tags) = "gorm:\"serializer:json\""];

  // Enabled indicates whether the user is active/enabled in the system
  bool enabled = 7;

  // Attributes contains additional key-value pairs associated with the user, such as department or team.
  map<string, string> attributes = 8 [(tagger.tags) = "gorm:\"serializer:json\""];
}

// Predefined roles in the system. These should align with the roles defined in the IdP
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_COMPLIANCE_MANAGER = 2;
  ROLE_EXPERT_COMPLIANCE_MANAGER = 3;
  ROLE_INTERNAL_CONTROL_OWNER = 4;
  ROLE_TECHNICAL_IMPLEMENTER = 5;
  ROLE_AUDITOR = 6;
  ROLE_CHIEF_INFORMATION_SECURITY_OFFICER = 7;
}

message GetCurrentUserRequest {
  // Empty request - user is identified from authentication context
}

message GetUserRequest {
  string user_id = 1 [
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];
}

message ListUsersRequest {
  message Filter {
    // Optional. Filter by role (e.g., "compliance_manager")
    optional Role role = 1 [(buf.validate.field).enum = {defined_only: true}];

    // Optional. Filter by enabled/disabled status
    optional bool enabled = 2;

    // Optional. Search query for username, email, first name, or last name
    optional string search = 3;

    // Optional. Filter by specific attribute key-value pairs (e.g., department)
    map<string, string> attributes = 4;
  }

  optional Filter filter = 1;

  int32 page_size = 10;
  string page_token = 11;
  string order_by = 12;
  bool asc = 13;
}

message ListUsersResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

message ListUserRolesRequest {
  int32 page_size = 10;
  string page_token = 11;
}
message ListUserRolesResponse {
  repeated Role roles = 1;
}