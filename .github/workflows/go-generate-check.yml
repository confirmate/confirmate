name: Proto generated files check

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'core/api/**/*.proto'
      - 'core/api/**/*.pb.go'
      - 'core/api/**/openapi.yaml'
      - 'core/api/**/*.connect.go'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  check-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main branch
        run: git fetch origin main

      - name: Check proto and generated files
        shell: bash
        run: |
          CHANGED_PROTOS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^core/api/.*\.proto$' || true)
          for proto in $CHANGED_PROTOS; do
            dir=$(dirname "$proto")
            base=$(basename "$proto" .proto)

            # Always check pb.go
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^$dir/$base\.pb\.go$"; then
              echo "❌ $proto changed, but $dir/$base.pb.go was not updated."
              exit 1
            fi

            # Skip connect.go and openapi.yaml for:
            # 1. Anything in 'core/api/common'
            # 2. The specific file 'core/api/assessment/metric.proto'
            if [[ "$dir" != "core/api/common" && "$proto" != "core/api/assessment/metric.proto" ]]; then
              if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^$dir/${base}connect/$base\.connect\.go$"; then
                echo "❌ $proto changed, but $dir/${base}connect/$base.connect.go was not updated."
                exit 1
              fi
              if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^$dir/openapi\.yaml$"; then
                echo "❌ $proto changed, but $dir/openapi.yaml was not updated."
                exit 1
              fi
            fi
          done